<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Flexbox</title>
    <style>
        body{
            font-family: sans-serif;
            margin: 0;
        }
        .navbar ul{
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
            background-color: rgba(123,198,199,0.8);
        }
        .navbar li{
            flex: 1;
            text-align: left;
            border-left: 3px solid rgba(255, 255, 255);
        }
        .navbar li:last-child{
            border-right: 3px solid rgba(255, 255, 255);
        }
        .navbar a{
            display: block;
            padding: 15px 0;
            text-decoration: none;
            color: #000000;
        }
        
            
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Opciones</a></li>
            <li><a href="#">Planes</a></li>
            <li><a href="#">Contacto</a></li>    
        </ul>
    </nav>
</body>
</html>
