<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexBox Ejercicio 10</title>
<style>
body{
    font-family: sans-serif;
    flex-direction: column;
    display:flex;
    height: 100vh;
  }
  .cabecera{
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
    background: #D08700;
    height: 24px;
    
  }
  div{
    text-align: center;
  }
  .cuerpo{
    display: flex;
    height: 100%;
  }
  .sidebar{
    flex: 1 1 0;
    background: #4D4F52;
    color: white;
    padding: 24px;
  }
  .central{
    flex: 3 1 0;
    padding: 24px;
  }
</style>
</head>
<body>
    <div class="cabecera">Titulo de la página</div>
    <div class="cuerpo">
        <div class="sidebar">Lateral izquierdo</div>
        <div class="central">Zona central</div>
        <div class="sidebar">Lateral derecho</div>
    </div>
</body>
</html>
