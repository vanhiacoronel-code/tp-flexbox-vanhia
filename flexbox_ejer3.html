<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox Ejercicio 3</title>
    <style>
        ul{
            display: flex;
            justify-content: space-between;
            gap: 2px;
            padding: 0;
            list-style: none;
        }
        ul li{
            font-family: sans-serif;
            background: rgba(123, 198, 199, 0.8);
            flex: 1 1 0;
        }
    </style>
</head>
<body>
    <ul>
        <li>Solo tengo una línea</li>
        <li>Este texto ocupa alg más que el de al lado <br>
        Son dos lineas</li>
        <li>Este es más largo que los otros dos y ocupa más líneas
        <p>Pero todos estos bloques tienen la misma altura y anchura, crecen o de contraen para repetirse el ancho disponible</p></li>  
    </ul>
</body>
</html>
